name: Android APK Build

on:
  push:
    branches: [main]
  workflow_dispatch:
  release:
    types: [created]

env:
  GODOT_VERSION: 4.2.2-stable
  GODOT_BIN_NAME: Godot_v4.2.2-stable_linux.x86_64

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Cache Godot binary + templates
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: |
            ~/godot-bin
            ~/.local/share/godot/export_templates
          key: godot-${{ env.GODOT_VERSION }}

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('godot/android/build/build.gradle', 'godot/android/build/config.gradle', 'godot/android/build/settings.gradle') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Download Godot binary
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/godot-bin
          cd ~/godot-bin
          curl -fL -o godot.zip "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}/${{ env.GODOT_BIN_NAME }}.zip"
          unzip -q godot.zip
          mv ${{ env.GODOT_BIN_NAME }} godot
          chmod +x godot
          rm godot.zip

      - name: Download Godot export templates
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/share/godot/export_templates
          cd ~/.local/share/godot/export_templates
          curl -fL -o templates.tpz "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}/Godot_v${{ env.GODOT_VERSION }}_export_templates.tpz"
          unzip -q templates.tpz
          mv templates ${GODOT_VERSION//-/.}
          rm templates.tpz

      - name: Configure Godot editor settings
        run: |
          mkdir -p ~/.config/godot
          cat > ~/.config/godot/editor_settings-4.tres <<EOF
          [gd_resource type="EditorSettings" format=3]
          [resource]
          export/android/java_sdk_path = "${JAVA_HOME}"
          export/android/android_sdk_path = "${ANDROID_SDK_ROOT}"
          export/android/debug_keystore = ""
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          EOF

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
        run: |
          mkdir -p secrets
          echo "$KEYSTORE_BASE64" | base64 -d > secrets/release.keystore
          ls -la secrets/release.keystore

      - name: Restore Android build template libs (regenerable, not committed)
        run: |
          cd godot/android/build
          unzip -q -o ~/.local/share/godot/export_templates/4.2.2.stable/android_source.zip 'libs/*' -d .
          ls -lh libs/debug libs/release

      - name: Import project (build .godot cache, 2 passes for class_name resolution)
        run: |
          ~/godot-bin/godot --headless --path godot --editor --quit-after 200 || true
          ~/godot-bin/godot --headless --path godot --editor --quit-after 200 || true

      - name: Build release APK
        env:
          GODOT_ANDROID_KEYSTORE_RELEASE_PATH: ${{ github.workspace }}/secrets/release.keystore
          GODOT_ANDROID_KEYSTORE_RELEASE_USER: nightseed
          GODOT_ANDROID_KEYSTORE_RELEASE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
        run: |
          mkdir -p build
          ~/godot-bin/godot --headless --path godot --export-release "Android" "${{ github.workspace }}/build/nightseed-survivor-release.apk"
          ls -la build/

      - name: Verify APK signature
        run: |
          APKSIGNER=$(ls $ANDROID_SDK_ROOT/build-tools/*/apksigner | head -1)
          $APKSIGNER verify --verbose --print-certs build/nightseed-survivor-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nightseed-survivor-apk
          path: build/nightseed-survivor-release.apk
          retention-days: 30

      - name: Attach APK to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: build/nightseed-survivor-release.apk
