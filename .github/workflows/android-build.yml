name: Build (Android + Windows + Linux + Web)

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  GODOT_VERSION: 4.2.2-stable
  GODOT_BIN_NAME: Godot_v4.2.2-stable_linux.x86_64

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-35 build-tools;35.0.0'

      - name: Cache Godot binary + templates
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: |
            ~/godot-bin
            ~/.local/share/godot/export_templates
          key: godot-${{ env.GODOT_VERSION }}

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('godot/android/build/build.gradle', 'godot/android/build/config.gradle', 'godot/android/build/settings.gradle') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Download Godot binary
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/godot-bin
          cd ~/godot-bin
          curl -fL -o godot.zip "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}/${{ env.GODOT_BIN_NAME }}.zip"
          unzip -q godot.zip
          mv ${{ env.GODOT_BIN_NAME }} godot
          chmod +x godot
          rm godot.zip

      - name: Download Godot export templates
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/share/godot/export_templates
          cd ~/.local/share/godot/export_templates
          curl -fL -o templates.tpz "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}/Godot_v${{ env.GODOT_VERSION }}_export_templates.tpz"
          unzip -q templates.tpz
          mv templates ${GODOT_VERSION//-/.}
          rm templates.tpz

      - name: Configure Godot editor settings
        run: |
          mkdir -p ~/.config/godot
          cat > ~/.config/godot/editor_settings-4.tres <<EOF
          [gd_resource type="EditorSettings" format=3]
          [resource]
          export/android/java_sdk_path = "${JAVA_HOME}"
          export/android/android_sdk_path = "${ANDROID_SDK_ROOT}"
          export/android/debug_keystore = ""
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          EOF

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
        run: |
          mkdir -p .keystore
          echo "$KEYSTORE_BASE64" | base64 -d > .keystore/release.keystore
          ls -la .keystore/release.keystore

      - name: Restore Android build template libs (regenerable, not committed)
        run: |
          cd godot/android/build
          unzip -q -o ~/.local/share/godot/export_templates/4.2.2.stable/android_source.zip 'libs/*' -d .
          ls -lh libs/debug libs/release

      - name: Make gradlew executable
        run: chmod +x godot/android/build/gradlew

      - name: Import project (build .godot cache, 2 passes for class_name resolution)
        run: |
          ~/godot-bin/godot --headless --path godot --editor --quit-after 200 || true
          ~/godot-bin/godot --headless --path godot --editor --quit-after 200 || true

      - name: Headless smoke (boot menu + game scene; fail on runtime errors)
        run: |
          set -e
          mkdir -p smoke

          # 1. Main menu boot (default scene) — verifies autoloads + main UI
          ~/godot-bin/godot --headless --path godot --quit-after 120 \
            2>&1 | tee smoke/menu.log

          # 2. GameRoot scene — verifies WaveManager, StoryBanner intro, HUD, signals
          ~/godot-bin/godot --headless --path godot \
            res://scenes/main/GameRoot.tscn --quit-after 600 \
            2>&1 | tee smoke/game.log

          # Filter known-harmless lines, fail if any real runtime error remains.
          FAIL='SCRIPT ERROR|USER ERROR|^ERROR: |Failed to load|Failed to instantiate|Invalid get index|Invalid call|Nonexistent function|Cannot call method|attempt to call'
          IGNORE='ObjectDB instances leaked|Custom cursor shape|Blend file import|Game Services'

          FILTERED=$(grep -E "$FAIL" smoke/*.log 2>/dev/null | grep -vE "$IGNORE" || true)
          if [ -n "$FILTERED" ]; then
            echo "::error::Headless smoke detected runtime errors:"
            echo "$FILTERED"
            exit 1
          fi
          echo "✓ Headless smoke passed (no runtime errors)."

      - name: Build release APK
        env:
          GODOT_ANDROID_KEYSTORE_RELEASE_PATH: ${{ github.workspace }}/.keystore/release.keystore
          GODOT_ANDROID_KEYSTORE_RELEASE_USER: nightseed
          GODOT_ANDROID_KEYSTORE_RELEASE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
        run: |
          mkdir -p build
          ~/godot-bin/godot --headless --path godot --export-release "Android" "${{ github.workspace }}/build/nightseed-survivor-release.apk"
          ls -la build/

      - name: Verify APK signature
        run: |
          APKSIGNER=$(ls $ANDROID_SDK_ROOT/build-tools/*/apksigner | head -1)
          $APKSIGNER verify --verbose --print-certs build/nightseed-survivor-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nightseed-survivor-apk
          path: build/nightseed-survivor-release.apk
          retention-days: 30

      - name: Build release AAB (Android App Bundle for Play Store)
        env:
          GODOT_ANDROID_KEYSTORE_RELEASE_PATH: ${{ github.workspace }}/.keystore/release.keystore
          GODOT_ANDROID_KEYSTORE_RELEASE_USER: nightseed
          GODOT_ANDROID_KEYSTORE_RELEASE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
        run: |
          ~/godot-bin/godot --headless --path godot --export-release "Android AAB" "${{ github.workspace }}/build/nightseed-survivor-release.aab"
          ls -lh build/nightseed-survivor-release.aab

      - name: Collect R8 mapping.txt (deobfuscation file for Play Console)
        run: |
          # R8 emits mapping.txt to godot/android/build/build/outputs/mapping/release/mapping.txt
          # when minifyEnabled=true. Bundle the AAB build output here for upload.
          MAPPING_SRC="godot/android/build/build/outputs/mapping/release/mapping.txt"
          if [ -f "$MAPPING_SRC" ]; then
            cp "$MAPPING_SRC" "build/nightseed-survivor-release.mapping.txt"
            ls -lh build/nightseed-survivor-release.mapping.txt
            echo "✓ mapping.txt captured ($(wc -l < build/nightseed-survivor-release.mapping.txt) lines)"
          else
            echo "::warning::R8 mapping.txt not found at $MAPPING_SRC — was minifyEnabled set?"
            # Create empty placeholder so downstream steps don't fail
            : > build/nightseed-survivor-release.mapping.txt
          fi

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: nightseed-survivor-aab
          path: |
            build/nightseed-survivor-release.aab
            build/nightseed-survivor-release.mapping.txt
          retention-days: 30

      - name: Build Windows release
        run: |
          ~/godot-bin/godot --headless --path godot --export-release "Windows Desktop" "${{ github.workspace }}/build/nightseed-survivor.exe"
          ls -la build/nightseed-survivor.exe

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: nightseed-survivor-windows
          path: build/nightseed-survivor.exe
          retention-days: 30

      - name: Build Linux release
        run: |
          ~/godot-bin/godot --headless --path godot --export-release "Linux/X11" "${{ github.workspace }}/build/nightseed-survivor.x86_64"
          chmod +x build/nightseed-survivor.x86_64
          ls -la build/nightseed-survivor.x86_64

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: nightseed-survivor-linux
          path: build/nightseed-survivor.x86_64
          retention-days: 30

      - name: Build Web release
        run: |
          # 1. Prepare gh-pages root structure
          mkdir -p build/gh-pages-root/live
          mkdir -p build/gh-pages-root/assets

          # 2. Export Godot web build to /live/
          ~/godot-bin/godot --headless --path godot --export-release "Web" "${{ github.workspace }}/build/gh-pages-root/live/index.html"
          
          # 3. Inject COI service worker and copy extras to /live/
          cp godot/web_extras/coi-serviceworker.js build/gh-pages-root/live/
          sed -i 's|<head>|<head>\n\t<script src="coi-serviceworker.js"></script>|' build/gh-pages-root/live/index.html
          cp godot/web_extras/privacy.html build/gh-pages-root/live/

          # 4. Set up branding page at root
          cp branding/index.html build/gh-pages-root/
          # Mirror privacy.html to root so the legacy URL
          # (https://jeiel85.github.io/nightseed-survivor/privacy.html)
          # registered in Play Console / AdMob keeps working alongside
          # the new /live/privacy.html path.
          cp godot/web_extras/privacy.html build/gh-pages-root/
          
          # 5. Copy branding assets (icons, screenshots)
          cp play_store/icon_512.png build/gh-pages-root/assets/icon.png
          cp branding/assets/pages.png build/gh-pages-root/assets/pages.png
          cp play_store/feature_graphic_1024x500.png build/gh-pages-root/assets/feature_graphic.png
          cp play_store/screenshot_1_menu.png build/gh-pages-root/assets/screenshot_1.png
          cp play_store/screenshot_2_gameplay.png build/gh-pages-root/assets/screenshot_2.png
          cp play_store/screenshot_3_levelup.png build/gh-pages-root/assets/screenshot_3.png
          cp play_store/screenshot_4_boss.png build/gh-pages-root/assets/screenshot_4.png
          cp play_store/screenshot_5_victory.png build/gh-pages-root/assets/screenshot_5.png

          ls -la build/gh-pages-root/
          ls -la build/gh-pages-root/live/

      - name: Upload Web artifact
        uses: actions/upload-artifact@v4
        with:
          name: nightseed-survivor-web
          path: build/gh-pages-root/
          retention-days: 30

      - name: Deploy Web to GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/gh-pages-root
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "deploy: web build and branding page for ${{ github.sha }}"

      - name: Resolve release notes
        if: startsWith(github.ref, 'refs/tags/v')
        id: notes
        run: |
          # Prefer a hand-written file at docs/releases/<tag>.md if it exists,
          # otherwise fall back to GitHub's auto-generated changelog.
          NOTES_FILE="docs/releases/${{ github.ref_name }}.md"
          if [ -f "$NOTES_FILE" ]; then
            echo "Using hand-written notes from $NOTES_FILE"
            echo "body_path=$NOTES_FILE" >> "$GITHUB_OUTPUT"
            echo "generate=false" >> "$GITHUB_OUTPUT"
          else
            echo "No $NOTES_FILE found, using auto-generated notes"
            echo "body_path=" >> "$GITHUB_OUTPUT"
            echo "generate=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create / update GitHub Release on tag push
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: ${{ steps.notes.outputs.body_path }}
          generate_release_notes: ${{ steps.notes.outputs.generate == 'true' }}
          fail_on_unmatched_files: true
          files: |
            build/nightseed-survivor-release.apk
            build/nightseed-survivor-release.aab
            build/nightseed-survivor-release.mapping.txt
            build/nightseed-survivor.exe
            build/nightseed-survivor.x86_64
